<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Classroom | Attendance</title>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    
    <style>
        .sidebar { background: rgba(255,255,255,0.7); backdrop-filter: blur(20px); border-right: 1px solid rgba(255,255,255,0.5); display: flex; flex-direction: column; justify-content: space-between; }
        .dark-mode .sidebar { background: rgba(30,41,59,0.8); border-right-color: rgba(255,255,255,0.1); }
        .sidebar-brand { font-size: 24px; font-weight: 700; color: var(--primary-color); margin-bottom: 40px; display: flex; align-items: center; gap: 10px; }
        .sidebar-menu { list-style: none; display: flex; flex-direction: column; gap: 10px; }
        .sidebar-menu li a { display: flex; align-items: center; gap: 15px; padding: 14px 20px; text-decoration: none; color: var(--text-muted); font-weight: 500; border-radius: 12px; transition: 0.3s; }
        .sidebar-menu li a:hover, .sidebar-menu li.active a { background: var(--primary-color); color: white; box-shadow: 0 4px 15px rgba(79,70,229,0.3); transform: translateX(5px); }
        .dark-mode .sidebar-menu li a { color: #94a3b8; } .dark-mode .sidebar-menu li a:hover, .dark-mode .sidebar-menu li.active a { color: white; }
        .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; background: rgba(255,255,255,0.6); backdrop-filter: blur(10px); padding: 15px 30px; border-radius: var(--border-radius); box-shadow: 0 4px 20px rgba(0,0,0,0.03); border: 1px solid rgba(255,255,255,0.5); }
        .dark-mode .topbar { background: rgba(30,41,59,0.6); border-color: rgba(255,255,255,0.05); }

        .action-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        
        /* Select Dropdowns */
        .filter-controls { display: flex; gap: 15px; }
        .custom-select { padding: 10px 15px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.1); background: rgba(255,255,255,0.8); outline: none; font-size: 14px; color: var(--text-dark); }
        .dark-mode .custom-select { background: rgba(30,41,59,0.8); border-color: rgba(255,255,255,0.2); color: white; }
        
        .btn-action { background: linear-gradient(135deg, var(--secondary-color), #34d399); color: white; padding: 12px 25px; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(16,185,129,0.3); display: flex; align-items: center; gap: 8px; }
        .btn-action:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(16,185,129,0.4); }

        .data-table-container { background: rgba(255,255,255,0.7); backdrop-filter: blur(10px); border-radius: 20px; padding: 25px; border: 1px solid rgba(255,255,255,0.6); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .dark-mode .data-table-container { background: rgba(30,41,59,0.7); border-color: rgba(255,255,255,0.1); }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px 20px; text-align: left; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .dark-mode th, .dark-mode td { border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { font-weight: 600; color: var(--text-muted); text-transform: uppercase; font-size: 13px; }
        .dark-mode th { color: #94a3b8; }
        
        /* Checkbox styling */
        .check-container { display: block; position: relative; padding-left: 25px; cursor: pointer; font-size: 16px; user-select: none; }
        .check-container input { position: absolute; opacity: 0; cursor: pointer; height: 0; width: 0; }
        .checkmark { position: absolute; top: 0; left: 0; height: 20px; width: 20px; background-color: rgba(0,0,0,0.1); border-radius: 4px; transition: 0.2s; }
        .dark-mode .checkmark { background-color: rgba(255,255,255,0.2); }
        .check-container:hover input ~ .checkmark { background-color: rgba(0,0,0,0.2); }
        .check-container input:checked ~ .checkmark { background-color: var(--primary-color); }
        .checkmark:after { content: ""; position: absolute; display: none; }
        .check-container input:checked ~ .checkmark:after { display: block; }
        .check-container .checkmark:after { left: 7px; top: 3px; width: 5px; height: 10px; border: solid white; border-width: 0 2px 2px 0; transform: rotate(45deg); }

        .status-badge { padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .status-present { background: rgba(16,185,129,0.1); color: #059669; }
        .status-absent { background: rgba(239,68,68,0.1); color: #dc2626; }
        .dark-mode .status-present { background: rgba(16,185,129,0.2); color: #34d399; }
        .dark-mode .status-absent { background: rgba(239,68,68,0.2); color: #f87171; }
    </style>
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div>
                <div class="sidebar-brand"><i class="fa-solid fa-graduation-cap"></i> SmartClass</div>
                <ul class="sidebar-menu">
                    <li><a href="dashboard.html"><i class="fa-solid fa-house"></i> Dashboard</a></li>
                    <li><a href="Students.html"><i class="fa-solid fa-user-graduate"></i> Students</a></li>
                    <li><a href="teachers.html"><i class="fa-solid fa-chalkboard-user"></i> Teachers</a></li>
                    <li class="active"><a href="attendance.html"><i class="fa-solid fa-calendar-check"></i> Attendance</a></li>
                    <li><a href="assignments.html"><i class="fa-solid fa-book-open"></i> Assignments</a></li>
                    <li><a href="announcements.html"><i class="fa-solid fa-bullhorn"></i> Announcements</a></li>
                    <li><a href="timetable.html"><i class="fa-solid fa-clock"></i> Timetable</a></li>
                </ul>
            </div>
            <ul class="sidebar-menu">
                <li><a href="index.html" class="logout-btn"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <h2>Attendance Portal</h2>
                <div class="user-profile">
                    <button class="theme-toggle" onclick="toggleTheme()"><i class="fa-solid fa-moon"></i></button>
                    <div class="avatar"><i class="fa-solid fa-user"></i></div>
                </div>
            </header>

            <div class="action-bar">
                <div class="filter-controls">
                    <input type="date" class="custom-select" value="2026-03-15">
                    <select class="custom-select">
                        <option value="math">Grade 10 - Mathematics</option>
                        <option value="phy">Grade 10 - Physics</option>
                    </select>
                </div>
                <div>
                    <button class="btn-action" style="background: linear-gradient(135deg, #3b82f6, #60a5fa); margin-right: 15px; display: inline-flex;" onclick="alert('Report Generating...')"><i class="fa-solid fa-file-export"></i> Export Report</button>
                    <button class="btn-action" style="display: inline-flex;"><i class="fa-solid fa-save"></i> Save Attendance</button>
                </div>
            </div>

            <div class="data-table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Select</th>
                            <th>ID</th>
                            <th>Student Name</th>
                            <th>Previous Status</th>
                            <th>Notes</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>
                                <label class="check-container">
                                    <input type="checkbox" checked>
                                    <span class="checkmark"></span>
                                </label>
                            </td>
                            <td>#S001</td>
                            <td>John Doe</td>
                            <td><span class="status-badge status-present">Present</span></td>
                            <td><input type="text" placeholder="Optional notes" class="custom-select" style="padding: 5px 10px;"></td>
                        </tr>
                        <tr>
                            <td>
                                <label class="check-container">
                                    <input type="checkbox">
                                    <span class="checkmark"></span>
                                </label>
                            </td>
                            <td>#S002</td>
                            <td>Jane Smith</td>
                            <td><span class="status-badge status-absent">Absent</span></td>
                            <td><input type="text" placeholder="Optional notes" class="custom-select" style="padding: 5px 10px;"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="assets/js/app.js"></script>
    <script>
        // Main app.js handles toggleTheme
    </script>
</body>
</html>
